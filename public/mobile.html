<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#070809">
  <title>BurnDelta — Mobile Upload</title>
  <style>
    :root {
      --bg: #070809;
      --surface: #0c0e0e;
      --line: #1a2222;
      --safe: #00e5a0;
      --surplus: #f97316;
      --text: #e4e4e7;
      --muted: #52525b;
      --sys: "JetBrains Mono", "Fira Code", "Roboto Mono", Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 40px;
    }

    /* Grid overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .card {
      position: relative;
      width: min(420px, 100%);
      background: rgba(8,10,10,0.96);
      border: 1px solid rgba(0,229,160,0.14);
      border-radius: 14px;
      padding: 24px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(90deg, transparent, rgba(0,229,160,0.5), transparent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-bolt {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 7px;
      border: 1.5px solid var(--safe);
      background: rgba(0,229,160,0.08);
      color: var(--safe);
      font-size: 15px;
      box-shadow: 0 0 12px rgba(0,229,160,0.18);
    }

    .logo-name {
      font-family: var(--sys);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #fff;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Camera / file picker */
    .snap-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 160px;
      border: 1.5px dashed #1e2828;
      border-radius: 10px;
      background: #080b0b;
      cursor: pointer;
      transition: border-color 180ms, background 180ms;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .snap-zone:hover, .snap-zone:focus-within {
      border-color: rgba(0,229,160,0.35);
      background: rgba(0,229,160,0.03);
    }

    .snap-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }

    .snap-zone .snap-icon { font-size: 32px; }
    .snap-zone .snap-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .snap-zone .snap-hint  { font-size: 11px; color: var(--muted); font-family: var(--sys); letter-spacing: 0.04em; }

    .preview-wrap {
      display: none;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .preview-wrap img {
      width: 100%;
      display: block;
      max-height: 240px;
      object-fit: cover;
    }

    /* Divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      color: #2a3a3a;
      font-family: var(--sys);
      font-size: 9px;
      letter-spacing: 0.14em;
    }

    .or-divider::before, .or-divider::after {
      content: ""; height: 1px; flex: 1; background: var(--line);
    }

    textarea {
      width: 100%;
      background: #080b0b;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 180ms;
      margin-bottom: 16px;
    }

    textarea::placeholder { color: #2a3a3a; }
    textarea:focus { border-color: rgba(0,229,160,0.4); }

    .submit-btn {
      width: 100%;
      height: 50px;
      background: var(--safe);
      border: none;
      border-radius: 8px;
      color: #050f0c;
      font-family: var(--sys);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: opacity 150ms, box-shadow 150ms;
      box-shadow: 0 0 22px rgba(0,229,160,0.22);
    }

    .submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .submit-btn:not(:disabled):hover {
      opacity: 0.88;
      box-shadow: 0 0 32px rgba(0,229,160,0.38);
    }

    /* Status messages */
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-family: var(--sys);
      font-size: 11px;
      letter-spacing: 0.04em;
      display: none;
    }

    .status.error {
      display: block;
      background: rgba(249,115,22,0.08);
      border: 1px solid rgba(249,115,22,0.25);
      color: var(--surplus);
    }

    .status.success {
      display: block;
      background: rgba(0,229,160,0.07);
      border: 1px solid rgba(0,229,160,0.22);
      color: var(--safe);
      text-align: center;
    }

    /* Success screen */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 0 16px;
      text-align: center;
    }

    .success-screen.visible { display: flex; }

    .success-check {
      font-size: 48px;
      filter: drop-shadow(0 0 16px rgba(0,229,160,0.55));
    }

    .success-screen h2 { font-size: 18px; font-weight: 700; }
    .success-screen p  { font-size: 12px; color: var(--muted); }

    .food-result {
      margin-top: 16px;
      padding: 14px 16px;
      background: #080b0b;
      border: 1px solid rgba(0,229,160,0.15);
      border-radius: 8px;
      width: 100%;
      display: none;
    }

    .food-result .food-name {
      font-family: var(--sys);
      font-size: 11px;
      color: var(--safe);
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .food-result .food-cal {
      font-size: 22px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .food-result .food-cal-unit {
      font-family: var(--sys);
      font-size: 10px;
      color: var(--muted);
      margin-left: 4px;
    }

    /* Label style */
    label.field-label {
      display: block;
      font-family: var(--sys);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #3a5050;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(5,15,12,0.3);
      border-top-color: #050f0c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-bolt">⚡</div>
      <span class="logo-name">BURNDELTA</span>
    </div>

    <div id="uploadView">
      <h1>Log a meal</h1>
      <p class="subtitle">Take a photo or describe what you ate. This will sync directly to your desktop session.</p>

      <div class="snap-zone" id="snapZone">
        <span class="snap-icon">📷</span>
        <span class="snap-title">Tap to take photo</span>
        <span class="snap-hint">or choose from gallery</span>
        <input type="file" id="mealFileInput" accept="image/png,image/jpeg,image/webp" capture="environment">
      </div>

      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="Preview">
      </div>

      <div class="or-divider"><span>OR DESCRIBE</span></div>

      <label class="field-label" for="descInput">MEAL DESCRIPTION</label>
      <textarea id="descInput" rows="3" maxlength="180" placeholder="e.g. grilled chicken, rice, broccoli…"></textarea>

      <button class="submit-btn" id="submitBtn" disabled>SYNC TO DESKTOP</button>
      <div class="status error" id="errorMsg"></div>
    </div>

    <div class="success-screen" id="successView">
      <div class="success-check">✓</div>
      <h2>Synced!</h2>
      <p>Your meal has been logged. Check your desktop.</p>
      <div class="food-result" id="foodResult">
        <div class="food-name" id="foodName"></div>
        <span class="food-cal" id="foodCal"></span>
        <span class="food-cal-unit">kcal</span>
      </div>
    </div>
  </div>

  <script>
    // Extract token from URL
    const params = new URLSearchParams(location.search);
    const TOKEN = params.get("token") || "";

    if (!TOKEN) {
      document.getElementById("uploadView").innerHTML = `
        <p style="color:#f97316;font-family:monospace;font-size:12px;text-align:center;padding:24px 0">
          No token found. Scan a fresh QR code from your desktop.
        </p>`;
    }

    const fileInput  = document.getElementById("mealFileInput");
    const previewImg = document.getElementById("previewImg");
    const previewWrap= document.getElementById("previewWrap");
    const submitBtn  = document.getElementById("submitBtn");
    const descInput  = document.getElementById("descInput");
    const errorMsg   = document.getElementById("errorMsg");

    let imageDataUrl = "";

    function updateSubmitState() {
      submitBtn.disabled = !imageDataUrl && !descInput.value.trim();
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        imageDataUrl = e.target.result;
        previewImg.src = imageDataUrl;
        previewWrap.style.display = "block";
        document.getElementById("snapZone").style.display = "none";
        updateSubmitState();
      };
      reader.readAsDataURL(file);
    });

    descInput.addEventListener("input", updateSubmitState);

    submitBtn.addEventListener("click", async () => {
      errorMsg.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>ANALYZING…';

      try {
        const res = await fetch("/api/mobile-upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: TOKEN,
            imageDataUrl: imageDataUrl || "",
            description: descInput.value.trim(),
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || "Upload failed.";
          errorMsg.className = "status error";
          submitBtn.disabled = false;
          submitBtn.textContent = "SYNC TO DESKTOP";
          return;
        }

        // Show success
        document.getElementById("uploadView").style.display = "none";
        const successView = document.getElementById("successView");
        successView.classList.add("visible");

        if (data.food || data.calories) {
          const foodResult = document.getElementById("foodResult");
          document.getElementById("foodName").textContent = data.food || "";
          document.getElementById("foodCal").textContent = Math.round(data.calories || 0);
          foodResult.style.display = "block";
        }

      } catch {
        errorMsg.textContent = "Network error. Check your connection.";
        errorMsg.className = "status error";
        submitBtn.disabled = false;
        submitBtn.textContent = "SYNC TO DESKTOP";
      }
    });
  </script>
</body>
</html>
